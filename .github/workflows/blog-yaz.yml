name: 8-Hour Auto Blog Bot

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */8 * * *' # Her 8 saatte bir (Günde 3 kez)

jobs:
  generate-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Generate Content
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python script.py

      - name: Commit and Push
        run: |
          git config --global user.name "AI Content Bot"
          git config --global user.email "bot@datasecuretools.com"
          git add src/content/blog/*.md
          git diff --quiet && git diff --staged --quiet || (git commit -m "🚀 Auto-Blog: $(date)" && git push origin HEAD:main)